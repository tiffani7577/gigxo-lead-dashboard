<!doctype html>
<html lang="en">

  <head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-V6NH6N7TZG"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-V6NH6N7TZG');
    </script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Primary SEO -->
    <title>Gigxo — Gig Leads for DJs &amp; Live Artists</title>
    <meta name="description" content="Browse verified gig leads for DJs and performers across the US. Unlock contact info from $7. No commission, no middleman." />
    <meta name="keywords" content="DJ gigs, gig leads, DJ booking platform, event entertainment, hire a DJ, wedding DJ, nightclub DJ, musician gigs, performer bookings, gig marketplace" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Gigxo" />
    <!-- Canonical is set per-route in client (see meta-tags.ts) -->

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Gigxo — Gig Leads for DJs &amp; Live Artists" />
    <meta property="og:site_name" content="Gigxo" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:url" content="https://www.gigxo.com" />
    <meta name="twitter:image:alt" content="Gigxo — Gig Leads for DJs &amp; Live Artists" />

    <!-- JSON-LD Structured Data: LocalBusiness -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "Gigxo",
      "description": "South Florida performer lead marketplace connecting DJs, bands, and entertainers with venues and event clients.",
      "url": "https://www.gigxo.com",
      "telephone": "",
      "email": "support@gigxo.com",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Miami",
        "addressRegion": "FL",
        "addressCountry": "US"
      },
      "areaServed": [
        "Miami, FL",
        "Fort Lauderdale, FL",
        "Boca Raton, FL",
        "West Palm Beach, FL"
      ],
      "serviceType": "Entertainment Booking Marketplace"
    }
    </script>

    <!-- JSON-LD Structured Data: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Gigxo",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "7.00",
        "priceCurrency": "USD",
        "description": "Unlock individual gig lead contact info"
      },
      "description": "Gig lead marketplace for Miami and Fort Lauderdale DJs, bands, and performers."
    }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  </head>

  <body>
    <div id="root"></div>
